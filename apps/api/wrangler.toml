name = "dash-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "dash-db"
database_id = ""

# KV for cache/state
[[kv_namespaces]]
binding = "CACHE"
id = ""

# R2 for exports
[[r2_buckets]]
binding = "EXPORTS"
bucket_name = "dash-exports"

# Cron Trigger (daily at 00:05 UTC)
[triggers]
crons = ["5 0 * * *"]

# Environment variables - set via wrangler secret:
# JWT_SECRET, CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_TAG

[vars]
ENVIRONMENT = "production"
